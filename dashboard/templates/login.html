<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Agent — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo { font-size: 22px; font-weight: 700; color: #f59e0b; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #f1f5f9; font-size: 15px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #f59e0b; }
    button {
      margin-top: 8px; width: 100%; padding: 11px;
      background: #f59e0b; color: #0f172a;
      font-weight: 700; font-size: 15px;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #d97706; }
    .error {
      margin-top: 14px; padding: 10px 14px;
      background: #450a0a; border: 1px solid #991b1b;
      border-radius: 8px; color: #fca5a5; font-size: 13px;
    }
    .footer { margin-top: 20px; text-align: center; font-size: 13px; color: #64748b; }
    .footer a { color: #f59e0b; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Forex Agent</div>
    <div class="subtitle">Sign in to your account</div>
    <form method="POST">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autofocus autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Sign in</button>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </form>
    <div class="footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</body>
</html>
